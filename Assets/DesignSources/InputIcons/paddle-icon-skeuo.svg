<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 24 - Skeuomorphic theme.
    - HANDLE terminates in a raised cream DISC housing under the dial; one
      cream body, top-surface side edges TANGENT to the disc base ellipse
      (58,38); side face merges strokelessly into the disc wall.
    - DIAL: big knurled ring + smooth cream dome (frustum) + small knurled
      cap with the "0" mark; concentric with the disc, rising UP from the
      housing that seats on the handle top.
    - GRIP LINES: full side-to-side, parallel to the handle bottom edge.
    - BUTTON: arc tab of the housing at rx 24.5 vs 21, ~3:00-4:30, convex OUT.
    Circles squash to ry/rx = 0.35 (shared lower-right camera).
    Disc generated by scratchpad/gen_disc.py (knurl lines track the walls).
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8C2B1"/><stop offset="1" stop-color="#ABA593"/>
    </linearGradient>
    <linearGradient id="pDial" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#B5AF9D"/><stop offset="1" stop-color="#9A9483"/>
    </linearGradient>
    <linearGradient id="pDialWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A29C8A"/><stop offset="1" stop-color="#8B8573"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#C4BEAC"/><stop offset="1" stop-color="#A8A290"/>
    </linearGradient>
    <linearGradient id="pDome" x1="0.15" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#E2DCCB"/><stop offset="1" stop-color="#BAB3A0"/>
    </linearGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- HANDLE: constant-thickness slab, side wall down-extruded by 10 to the
       disc SE tangent generator at x=74.3 so slab + cylinder union with no
       gap. Draw order: side wall, tip face, top surface, grips, seam. -->
  <polygon points="26.8,66.9 74.3,42.6 74.3,52.6 26.8,76.9" fill="#B3AD9C"/>
  <line x1="26.8" y1="76.9" x2="73" y2="53.2" stroke="#8F8A7A" stroke-width="1.8"/>
  <path d="M 11.2,63.8 L 26.8,66.9 L 26.8,74.6 Q 26.8,76.9 24.3,76.4 L 13.6,74.3 Q 11.2,73.8 11.2,71.6 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M 38.4,35.4 A 21 7.3 0 1 1 74.3,42.6 L 29.0,65.8 Q 26.8,66.9 24.4,66.4 L 13.6,64.3 Q 11.2,63.8 12.9,62.0 Z"
        fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <g stroke="#A9A392" stroke-width="1.3">
    <line x1="16.6" y1="58.1" x2="36.3" y2="62.0"/>
    <line x1="18.8" y1="55.8" x2="40.1" y2="60.1"/>
    <line x1="21.0" y1="53.6" x2="43.9" y2="58.2"/>
    <line x1="23.2" y1="51.3" x2="47.7" y2="56.2"/>
    <line x1="25.3" y1="49.0" x2="51.5" y2="54.3"/>
    <line x1="27.5" y1="46.8" x2="55.3" y2="52.3"/>
    <line x1="29.7" y1="44.5" x2="59.1" y2="50.4"/>
    <line x1="31.9" y1="42.2" x2="62.9" y2="48.4"/>
  </g>
  <g stroke="#98927F" stroke-width="1.1">
    <line x1="36.3" y1="62.0" x2="36.3" y2="64.2"/>
    <line x1="40.1" y1="60.1" x2="40.1" y2="62.3"/>
    <line x1="43.9" y1="58.2" x2="43.9" y2="60.4"/>
    <line x1="47.7" y1="56.2" x2="47.7" y2="58.4"/>
    <line x1="51.5" y1="54.3" x2="51.5" y2="56.5"/>
    <line x1="55.3" y1="52.3" x2="55.3" y2="54.5"/>
    <line x1="59.1" y1="50.4" x2="59.1" y2="52.6"/>
    <line x1="62.9" y1="48.4" x2="62.9" y2="50.6"/>
  </g>
  <polygon points="20.2,63.5 23.1,64.1 25.2,61.9 22.3,61.3" fill="#A9A392" opacity="0.6"/>
  <line x1="27" y1="71.9" x2="61" y2="54.4" stroke="#8F8A7A" stroke-width="1" opacity="0.7"/>
  <line x1="61" y1="54.4" x2="73.5" y2="48.0" stroke="#8F8A7A" stroke-width="1" opacity="0.6"/>

  <!-- cream housing boss: base (58,38) seats on the handle top
       (the tangent ellipse); thin cream lip up to the rim at 34. -->
  <path d="M 37.0,34 A 21 7.3 0 0 0 79.0,34 L 79.0,38 A 21 7.3 0 0 1 37.0,38 Z" fill="url(#pWall)"/>
  <ellipse cx="58.0" cy="34" rx="21" ry="7.3" fill="url(#pWall)"/>
  <path d="M 37.0,38 A 21 7.3 0 0 0 79.0,38" fill="none" stroke="#8F8A7A" stroke-width="1.6" opacity="1.0"/>
  <ellipse cx="58.0" cy="34" rx="19.3" ry="6.7" fill="#6B6759"/>
  <!-- big knurled ring (dominant): wall 24..34 -->
  <path d="M 40.0,24 A 18 6.3 0 0 0 76.0,24 L 76.0,34 A 18 6.3 0 0 1 40.0,34 Z" fill="url(#pDialWall)"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="41.1" y1="26.1" x2="41.1" y2="36.1"/>
    <line x1="43.9" y1="27.9" x2="43.9" y2="37.9"/>
    <line x1="46.7" y1="28.9" x2="46.7" y2="38.9"/>
    <line x1="49.5" y1="29.5" x2="49.5" y2="39.5"/>
    <line x1="52.4" y1="29.9" x2="52.4" y2="39.9"/>
    <line x1="55.2" y1="30.2" x2="55.2" y2="40.2"/>
    <line x1="58.0" y1="30.3" x2="58.0" y2="40.3"/>
    <line x1="60.8" y1="30.2" x2="60.8" y2="40.2"/>
    <line x1="63.6" y1="29.9" x2="63.6" y2="39.9"/>
    <line x1="66.5" y1="29.5" x2="66.5" y2="39.5"/>
    <line x1="69.3" y1="28.9" x2="69.3" y2="38.9"/>
    <line x1="72.1" y1="27.9" x2="72.1" y2="37.9"/>
    <line x1="74.9" y1="26.1" x2="74.9" y2="36.1"/>
  </g>
  <ellipse cx="58.0" cy="24" rx="18" ry="6.3" fill="url(#pDial)" stroke="#726D5C" stroke-width="1.0"/>
  <!-- smooth cream dome (frustum) tapering into the cap; the -->
  <!-- pDome gradient (light upper-left) does the shading -->
  <path d="M 41.5,24 A 16.5 5.7 0 0 0 74.5,24 L 64.5,17.5 A 6.5 2.3 0 0 1 51.5,17.5 Z" fill="url(#pDome)"/>
  <ellipse cx="58.0" cy="17.5" rx="6.5" ry="2.3" fill="url(#pDome)" stroke="#8F8A7A" stroke-width="0.9"/>
  <!-- small knurled cap -->
  <path d="M 51.8,11.5 A 6.2 2.2 0 0 0 64.2,11.5 L 64.2,17.5 A 6.2 2.2 0 0 1 51.8,17.5 Z" fill="url(#pDialWall)"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="52.2" y1="12.2" x2="52.2" y2="18.2"/>
    <line x1="54.1" y1="13.2" x2="54.1" y2="19.2"/>
    <line x1="56.1" y1="13.5" x2="56.1" y2="19.5"/>
    <line x1="58.0" y1="13.7" x2="58.0" y2="19.7"/>
    <line x1="59.9" y1="13.5" x2="59.9" y2="19.5"/>
    <line x1="61.9" y1="13.2" x2="61.9" y2="19.2"/>
    <line x1="63.8" y1="12.2" x2="63.8" y2="18.2"/>
  </g>
  <ellipse cx="58.0" cy="11.5" rx="6.2" ry="2.2" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.3"/>
  <ellipse cx="58" cy="11.5" rx="3.7" ry="1.3" fill="none" stroke="#827D6C" stroke-width="0.9" opacity="0.8"/>
  <ellipse cx="58" cy="11.5" rx="1.3" ry="0.45" fill="none" stroke="#827D6C" stroke-width="1.1"/>
  <!-- fire button: arc tab on the housing SE side (convex out) -->
  <path d="M 78.9,33.4 A 21 7.3 0 0 1 72.8,39.2 L 75.3,40.5 L 75.3,45.0 A 24.5 8.5 0 0 0 82.4,39.5 L 82.4,33.4 Z"
        fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M 78.9,33.4 A 21 7.3 0 0 1 72.8,39.2 L 75.3,40.5 A 24.5 8.5 0 0 0 82.4,33.4 Z" fill="#FF7D46"/>
  <path d="M 72.8,39.2 L 75.3,40.5 L 75.3,45.0 L 72.8,43.7 Z" fill="#C24418"/>
</svg>
