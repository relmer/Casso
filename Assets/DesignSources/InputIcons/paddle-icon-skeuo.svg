<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 6 - Skeuomorphic theme.
    SHARED lower-right camera with the joystick and mouse, now at the same
    LOW elevation: horizontal circles squash to ry = rx/3, so the dial
    reads as a squat cylinder whose knurl shows on its visible WALL (the
    top ticks all but vanish at this angle, as on the real unit). The
    handle leans down-LEFT (skew 0.25 about its top) because south points
    toward the viewer. The fire button is a chunk of the head's own
    ellipse at 2 o'clock WITH HEIGHT: top arc band + east-facing outer
    wall + radial end-cut face (right/east walls are visible from this
    camera, like the joystick/mouse side faces).
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B6B09F"/><stop offset="1" stop-color="#98927F"/>
    </linearGradient>
    <linearGradient id="pDial" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#C1BBA9"/><stop offset="1" stop-color="#9A9483"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#D2CCBC"/><stop offset="1" stop-color="#ACA694"/>
    </linearGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- handle: leans down-left under the shared camera (skew about y=40) -->
  <g transform="matrix(1,0,-0.25,1,10,0)">
    <polygon points="61,40 65,43 60.5,82.5 57,79" fill="#A9A392" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="44,79 57,79 60.5,82.5 47.5,82.5" fill="#B3AD9C" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M 37,40 L 59,40 Q 61,40 61,43 L 57.5,76 Q 57,79 52,79 L 44,79 Q 39,79 38.5,76 L 35,43 Q 35,40 37,40 Z"
          fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
    <line x1="38"   y1="54" x2="58"   y2="54" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="38.8" y1="60" x2="57.2" y2="60" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="39.6" y1="66" x2="56.4" y2="66" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="40.4" y1="72" x2="55.6" y2="72" stroke="#A9A392" stroke-width="1.6"/>
  </g>

  <!-- fire button: top arc band, then east-facing outer wall (drop 8),
       then the radial end-cut face at the 3 o'clock end -->
  <path d="M 48,30 L 66.0,22.9 A 28 9.3 0 0 1 75.6,28.4 Z"
        fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 71.7,25.1 A 28 9.3 0 0 1 75.6,28.4 L 75.6,36.4 A 28 9.3 0 0 0 71.7,33.1 Z"
        fill="#C24418" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M 71.6,28.6 L 75.6,28.4 L 75.6,36.4 L 71.6,36.6 Z" fill="#A63C14"/>

  <!-- head: housing wall + top, squashed to the shared low elevation -->
  <ellipse cx="48" cy="38" rx="24" ry="8" fill="url(#pSide)" stroke="#8F8A7A" stroke-width="1.6"/>
  <ellipse cx="48" cy="30" rx="24" ry="8" fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2"/>

  <!-- knurled dial: raised 4 above the housing; the knurl reads on the
       visible wall crescent at this elevation -->
  <ellipse cx="48" cy="30" rx="19" ry="6.3" fill="url(#pSide)" stroke="#827D6C" stroke-width="1.4"/>
  <ellipse cx="48" cy="26" rx="19" ry="6.3" fill="url(#pDial)" stroke="#827D6C" stroke-width="1.5"/>
  <g stroke="#7E7967" stroke-width="1.6" opacity="0.85">
    <line x1="48" y1="32.3" x2="48" y2="36.3"/>
    <line x1="53" y1="32.1" x2="53" y2="36.1"/>
    <line x1="43" y1="32.1" x2="43" y2="36.1"/>
    <line x1="58" y1="31.4" x2="58" y2="35.4"/>
    <line x1="38" y1="31.4" x2="38" y2="35.4"/>
    <line x1="63" y1="29.9" x2="63" y2="33.9"/>
    <line x1="33" y1="29.9" x2="33" y2="33.9"/>
  </g>

  <!-- raised center cap -->
  <ellipse cx="48" cy="26" rx="10" ry="3.3" fill="url(#pSide)" stroke="#827D6C" stroke-width="1.3"/>
  <ellipse cx="48" cy="23.5" rx="10" ry="3.3" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.5"/>
</svg>
