<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 3 - Skeuomorphic theme.
    Same shared camera as the joystick (viewer lower-right, elevated):
    the handle extends SOUTH toward the viewer (front face + right side
    visible), the stacked knurled dial cylinders rise from the head at
    the back, and the orange fire button pokes out at the head's
    2 o'clock (matching the corrected top-down master). Cylinder minor
    axes are widened beyond the strict oblique ratio for legibility.
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C0BAA9"/><stop offset="1" stop-color="#9C9685"/>
    </linearGradient>
    <radialGradient id="pTop" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#D2CCBC"/><stop offset="1" stop-color="#B0AA99"/>
    </radialGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- handle: right side face, front face, top face (td (34,52)-(62,89) mapped, extruded down 13) -->
  <polygon points="49.8,57.8 58.1,50.8 58.1,63.8 49.8,70.8" fill="#A9A392" stroke="#8F8A7A" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M 34.5,57.8 L 49.8,57.8 L 49.8,68.8 Q 49.8,70.8 47.8,70.8 L 36.5,70.8 Q 34.5,70.8 34.5,68.8 Z"
        fill="url(#pBody)" stroke="#8F8A7A" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon points="36.8,50.8 58.1,50.8 49.8,57.8 34.5,57.8" fill="#E0DBCB" stroke="#8F8A7A" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- grip ribs: front face -->
  <line x1="36" y1="61"   x2="48.3" y2="61"   stroke="#A9A392" stroke-width="1.4"/>
  <line x1="36" y1="64"   x2="48.3" y2="64"   stroke="#A9A392" stroke-width="1.4"/>
  <line x1="36" y1="67"   x2="48.3" y2="67"   stroke="#A9A392" stroke-width="1.4"/>
  <line x1="38.5" y1="53.9" x2="52.5" y2="53.9" stroke="#A9A392" stroke-width="1.2" opacity="0.9"/>

  <!-- fire button at the head's 2 o'clock: raised orange box (drawn under the dial) -->
  <rect x="63" y="39" width="10" height="10" rx="3" fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.4"/>

  <!-- head: housing cylinder (base at the handle deck) -->
  <path d="M 31,46 A 19,8 0 0 0 69,46 L 69,52 A 19,8 0 0 1 31,52 Z"
        fill="url(#pSide)" stroke="#827D6C" stroke-width="1.6" stroke-linejoin="round"/>
  <ellipse cx="50" cy="46" rx="19" ry="8" fill="url(#pBody)" stroke="#8F8A7A" stroke-width="1.6"/>

  <!-- knurled dial ring -->
  <path d="M 34,40 A 16,6.8 0 0 0 66,40 L 66,47.5 A 16,6.8 0 0 1 34,47.5 Z"
        fill="url(#pSide)" stroke="#827D6C" stroke-width="1.4" stroke-linejoin="round"/>
  <g stroke="#7E7967" stroke-width="1.3" opacity="0.85">
    <line x1="37" y1="42.5" x2="37" y2="50"/>
    <line x1="41.3" y1="44.7" x2="41.3" y2="52.2"/>
    <line x1="45.6" y1="45.9" x2="45.6" y2="53.4"/>
    <line x1="50" y1="46.3" x2="50" y2="53.8"/>
    <line x1="54.4" y1="45.9" x2="54.4" y2="53.4"/>
    <line x1="58.7" y1="44.7" x2="58.7" y2="52.2"/>
    <line x1="63" y1="42.5" x2="63" y2="50"/>
  </g>
  <ellipse cx="50" cy="40" rx="16" ry="6.8" fill="url(#pTop)" stroke="#827D6C" stroke-width="1.4"/>

  <!-- cap cylinder with embossed oval -->
  <path d="M 42,33 A 8,3.4 0 0 0 58,33 L 58,40 A 8,3.4 0 0 1 42,40 Z"
        fill="url(#pSide)" stroke="#827D6C" stroke-width="1.4" stroke-linejoin="round"/>
  <ellipse cx="50" cy="33" rx="8" ry="3.4" fill="url(#pTop)" stroke="#827D6C" stroke-width="1.4"/>
  <ellipse cx="50" cy="33" rx="3.4" ry="1.4" fill="none" stroke="#948E7D" stroke-width="1.2"/>
</svg>
