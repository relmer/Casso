<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 13 - Skeuomorphic theme.
    - HANDLE terminates in a DISC (rx 21) under the dial; one cream body,
      top-surface side edges TANGENT to the disc ellipse ((37.7,36.1) and
      (77.2,40.9)); side face blends strokelessly into the disc wall.
    - DIAL: two flat knurled CYLINDERS (rx 17.5 / 7.5) joined by a
      small-radius FILLET skirt; concentric with the disc.
    - GRIP LINES: run fully side-to-side (NW edge to SE shoulder, no
      inset) and are PARALLEL to the handle's bottom edge - constant
      direction (17,10), the tip prism's transverse axis.
    - BUTTON: arc segment of the disc at rx 24.5 vs 21 spanning
      ~3:00-4:30; arcs bow OUTWARD (convex side away from the disc).
    Circles squash to ry/rx = 0.35 (shared lower-right camera).
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8C2B1"/><stop offset="1" stop-color="#ABA593"/>
    </linearGradient>
    <linearGradient id="pDial" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#B5AF9D"/><stop offset="1" stop-color="#9A9483"/>
    </linearGradient>
    <linearGradient id="pDialWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A29C8A"/><stop offset="1" stop-color="#8B8573"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#C4BEAC"/><stop offset="1" stop-color="#A8A290"/>
    </linearGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- handle-disc wall (one body with the handle) -->
  <path d="M 37,38 A 21 7.3 0 0 0 79,38 L 79,48 A 21 7.3 0 0 1 37,48 Z"
        fill="url(#pWall)" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- handle SE side face: blends into the disc wall (no stroke on the
       blend), silhouette stroked only along the bottom edge -->
  <polygon points="30,78 77,41 74,54 30,85" fill="#B3AD9C"/>
  <line x1="30" y1="85" x2="74" y2="54" stroke="#8F8A7A" stroke-width="1.8"/>
  <!-- tip end face -->
  <path d="M 13,68 L 30,78 L 30,82.5 Q 30,85 27.5,83.5 L 15.5,76.5 Q 13,75 13,72.5 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- unified top surface: disc top + handle top as ONE path, side edges
       tangent to the disc ellipse -->
  <path d="M 37.7,36.1 A 21 7.3 0 1 1 77.2,40.9 L 32.2,76.7 Q 30,78 27.8,76.7 L 15.2,69.3 Q 13,68 14.8,66.3 Z"
        fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- grip lines: full width NW edge -> SE shoulder, all parallel to the
       bottom edge (direction 17,10), wrapping over the SE shoulder -->
  <g stroke="#A9A392" stroke-width="1.3">
    <line x1="17.4" y1="62.3" x2="36.1" y2="73.2"/>
    <line x1="19.9" y1="59.1" x2="39.5" y2="70.6"/>
    <line x1="22.4" y1="55.9" x2="42.8" y2="67.9"/>
    <line x1="24.9" y1="52.7" x2="46.2" y2="65.3"/>
    <line x1="27.3" y1="49.5" x2="49.6" y2="62.6"/>
    <line x1="29.8" y1="46.3" x2="53.0" y2="59.9"/>
    <line x1="32.3" y1="43.1" x2="56.4" y2="57.3"/>
    <line x1="34.7" y1="39.9" x2="59.7" y2="54.6"/>
  </g>
  <g stroke="#98927F" stroke-width="1.1">
    <line x1="36.1" y1="73.2" x2="36.1" y2="75.4"/>
    <line x1="39.5" y1="70.6" x2="39.5" y2="72.8"/>
    <line x1="42.8" y1="67.9" x2="42.8" y2="70.1"/>
    <line x1="46.2" y1="65.3" x2="46.2" y2="67.5"/>
    <line x1="49.6" y1="62.6" x2="49.6" y2="64.8"/>
    <line x1="53.0" y1="59.9" x2="53.0" y2="62.1"/>
    <line x1="56.4" y1="57.3" x2="56.4" y2="59.5"/>
    <line x1="59.7" y1="54.6" x2="59.7" y2="56.8"/>
  </g>
  <!-- Apple badge chip in the smooth patch near the tip -->
  <polygon points="23.3,68.4 26.4,70.0 25.1,72.6 22.0,71.1" fill="#A9A392" opacity="0.6"/>
  <!-- shell parting seam along the handle, continuing under the button -->
  <line x1="31" y1="82" x2="71.5" y2="52.5" stroke="#8F8A7A" stroke-width="1" opacity="0.7"/>
  <line x1="71.5" y1="52.5" x2="75.3" y2="50.8" stroke="#8F8A7A" stroke-width="1" opacity="0.6"/>

  <!-- dark opening the dial sits in -->
  <ellipse cx="58" cy="38" rx="19.5" ry="6.8" fill="#6B6759"/>

  <!-- dial lower cylinder: flat top, 6-unit knurl band on its wall -->
  <path d="M 40.5,32 A 17.5 6.1 0 0 0 75.5,32 L 75.5,38 A 17.5 6.1 0 0 1 40.5,38 Z"
        fill="url(#pDialWall)"/>
  <ellipse cx="58" cy="32" rx="17.5" ry="6.1" fill="url(#pDial)" stroke="#827D6C" stroke-width="1.4"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="58" y1="38.1" x2="58" y2="44.1"/>
    <line x1="60.6" y1="38.0" x2="60.6" y2="44.0"/>
    <line x1="55.4" y1="38.0" x2="55.4" y2="44.0"/>
    <line x1="63.2" y1="37.8" x2="63.2" y2="43.8"/>
    <line x1="52.8" y1="37.8" x2="52.8" y2="43.8"/>
    <line x1="65.8" y1="37.5" x2="65.8" y2="43.5"/>
    <line x1="50.2" y1="37.5" x2="50.2" y2="43.5"/>
    <line x1="68.4" y1="36.9" x2="68.4" y2="42.9"/>
    <line x1="47.6" y1="36.9" x2="47.6" y2="42.9"/>
    <line x1="71" y1="36.1" x2="71" y2="42.1"/>
    <line x1="45" y1="36.1" x2="45" y2="42.1"/>
    <line x1="73.6" y1="34.8" x2="73.6" y2="40.8"/>
    <line x1="42.4" y1="34.8" x2="42.4" y2="40.8"/>
  </g>

  <!-- small-radius fillet where the cap cylinder meets the flat top -->
  <ellipse cx="58" cy="31.3" rx="10" ry="3.5" fill="#A6A08E"/>

  <!-- dial upper cylinder (knurled cap) -->
  <path d="M 50.5,23 A 7.5 2.6 0 0 0 65.5,23 L 65.5,32 A 7.5 2.6 0 0 1 50.5,32 Z"
        fill="url(#pDialWall)"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="58" y1="25.6" x2="58" y2="34.6"/>
    <line x1="60.4" y1="25.5" x2="60.4" y2="34.5"/>
    <line x1="55.6" y1="25.5" x2="55.6" y2="34.5"/>
    <line x1="62.8" y1="25.0" x2="62.8" y2="34.0"/>
    <line x1="53.2" y1="25.0" x2="53.2" y2="34.0"/>
    <line x1="65.2" y1="23.7" x2="65.2" y2="32.7"/>
    <line x1="50.8" y1="23.7" x2="50.8" y2="32.7"/>
  </g>
  <ellipse cx="58" cy="23" rx="7.5" ry="2.6" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.4"/>
  <!-- cap top: circular groove + the "0" mark -->
  <ellipse cx="58" cy="23" rx="4.4" ry="1.5" fill="none" stroke="#827D6C" stroke-width="0.9" opacity="0.8"/>
  <ellipse cx="58" cy="23" rx="1.5" ry="0.55" fill="none" stroke="#827D6C" stroke-width="1.1"/>

  <!-- fire button: arc segment of the handle disc at rx 24.5 (vs 21),
       following the disc curvature (convex side OUT), ~3:00-4:30 -->
  <path d="M 78.9,37.4 A 21 7.3 0 0 1 72.8,43.2 L 75.3,44.5 L 75.3,51.0 A 24.5 8.5 0 0 0 82.4,44.3 L 82.4,37.8 Z"
        fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M 78.9,37.4 A 21 7.3 0 0 1 72.8,43.2 L 75.3,44.5 A 24.5 8.5 0 0 0 82.4,37.8 Z"
        fill="#FF7D46"/>
  <path d="M 72.8,43.2 L 75.3,44.5 L 75.3,51.0 L 72.8,49.7 Z" fill="#C24418"/>
</svg>
