<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 26 - Skeuomorphic theme.
    - HANDLE terminates in a SUBSTANTIAL raised cream DISC (rx21) that the
      top-surface side edges are TANGENT to at (38.4,35.4)/(74.3,42.6); the
      disc base ellipse (58,38) seats on the handle top and the disc rises
      UP from there (base 38 -> rim 28), so there is no sunken overhang and
      no rogue seating line.
    - DIAL sits in a dark recess on the disc: TWO flat knurled cylinders
      (wide lower rx17.5 + narrow upper cap rx7.5) joined by a SMALL-radius
      fillet shoulder; cap top carries the "0" mark.
    - GRIP LINES full side-to-side, parallel to the handle bottom edge.
    - BUTTON: arc tab protruding slightly from the disc SE, ~3:00-4:30.
    Circles squash to ry/rx = 0.35 (shared lower-right camera).
    Disc generated by scratchpad/gen_disc.py (knurl lines track the walls).
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8C2B1"/><stop offset="1" stop-color="#ABA593"/>
    </linearGradient>
    <linearGradient id="pDial" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#B5AF9D"/><stop offset="1" stop-color="#9A9483"/>
    </linearGradient>
    <linearGradient id="pDialWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A29C8A"/><stop offset="1" stop-color="#8B8573"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#C4BEAC"/><stop offset="1" stop-color="#A8A290"/>
    </linearGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- HANDLE: constant-thickness slab, side wall down-extruded by 10 to the
       disc SE tangent generator at x=74.3 so slab + cylinder union with no
       gap. Draw order: side wall, tip face, top surface, grips, seam. -->
  <polygon points="26.8,66.9 74.3,42.6 74.3,52.6 26.8,76.9" fill="#B3AD9C"/>
  <line x1="26.8" y1="76.9" x2="73" y2="53.2" stroke="#8F8A7A" stroke-width="1.8"/>
  <path d="M 11.2,63.8 L 26.8,66.9 L 26.8,74.6 Q 26.8,76.9 24.3,76.4 L 13.6,74.3 Q 11.2,73.8 11.2,71.6 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M 38.4,35.4 A 21 7.3 0 1 1 74.3,42.6 L 29.0,65.8 Q 26.8,66.9 24.4,66.4 L 13.6,64.3 Q 11.2,63.8 12.9,62.0 Z"
        fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <g stroke="#A9A392" stroke-width="1.3">
    <line x1="16.6" y1="58.1" x2="36.3" y2="62.0"/>
    <line x1="18.8" y1="55.8" x2="40.1" y2="60.1"/>
    <line x1="21.0" y1="53.6" x2="43.9" y2="58.2"/>
    <line x1="23.2" y1="51.3" x2="47.7" y2="56.2"/>
    <line x1="25.3" y1="49.0" x2="51.5" y2="54.3"/>
    <line x1="27.5" y1="46.8" x2="55.3" y2="52.3"/>
    <line x1="29.7" y1="44.5" x2="59.1" y2="50.4"/>
    <line x1="31.9" y1="42.2" x2="62.9" y2="48.4"/>
  </g>
  <g stroke="#98927F" stroke-width="1.1">
    <line x1="36.3" y1="62.0" x2="36.3" y2="64.2"/>
    <line x1="40.1" y1="60.1" x2="40.1" y2="62.3"/>
    <line x1="43.9" y1="58.2" x2="43.9" y2="60.4"/>
    <line x1="47.7" y1="56.2" x2="47.7" y2="58.4"/>
    <line x1="51.5" y1="54.3" x2="51.5" y2="56.5"/>
    <line x1="55.3" y1="52.3" x2="55.3" y2="54.5"/>
    <line x1="59.1" y1="50.4" x2="59.1" y2="52.6"/>
    <line x1="62.9" y1="48.4" x2="62.9" y2="50.6"/>
  </g>
  <polygon points="20.2,63.5 23.1,64.1 25.2,61.9 22.3,61.3" fill="#A9A392" opacity="0.6"/>
  <line x1="27" y1="71.9" x2="61" y2="54.4" stroke="#8F8A7A" stroke-width="1" opacity="0.7"/>
  <line x1="61" y1="54.4" x2="73.5" y2="48.0" stroke="#8F8A7A" stroke-width="1" opacity="0.6"/>
  <!-- disc footprint: cream seating so the raised housing sits on the body -->
  <ellipse cx="58" cy="38" rx="21" ry="7.3" fill="url(#pBody)"/>

  <!-- housing = the handle's terminal cream DISC (rx21, slightly
       larger than the dial); base (58,38) seats on the handle top,
       rim (58,28), so the disc rises UP with no sunken overhang. -->
  <path d="M 37.0,28 A 21 7.3 0 0 0 79.0,28 L 79.0,38 A 21 7.3 0 0 1 37.0,38 Z" fill="url(#pWall)"/>
  <ellipse cx="58.0" cy="28" rx="21" ry="7.3" fill="url(#pWall)"/>
  <path d="M 37.0,38 A 21 7.3 0 0 0 79.0,38" fill="none" stroke="#8F8A7A" stroke-width="1.6" opacity="1.0"/>
  <ellipse cx="58.0" cy="28" rx="19.5" ry="6.8" fill="#6B6759"/>
  <!-- dial: wide lower knurled cylinder -->
  <path d="M 40.5,22 A 17.5 6.1 0 0 0 75.5,22 L 75.5,28 A 17.5 6.1 0 0 1 40.5,28 Z" fill="url(#pDialWall)"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="41.5" y1="24.1" x2="41.5" y2="30.1"/>
    <line x1="44.3" y1="25.8" x2="44.3" y2="31.8"/>
    <line x1="47.0" y1="26.7" x2="47.0" y2="32.7"/>
    <line x1="49.8" y1="27.4" x2="49.8" y2="33.4"/>
    <line x1="52.5" y1="27.8" x2="52.5" y2="33.8"/>
    <line x1="55.3" y1="28.0" x2="55.3" y2="34.0"/>
    <line x1="58.0" y1="28.1" x2="58.0" y2="34.1"/>
    <line x1="60.7" y1="28.0" x2="60.7" y2="34.0"/>
    <line x1="63.5" y1="27.8" x2="63.5" y2="33.8"/>
    <line x1="66.2" y1="27.4" x2="66.2" y2="33.4"/>
    <line x1="69.0" y1="26.7" x2="69.0" y2="32.7"/>
    <line x1="71.7" y1="25.8" x2="71.7" y2="31.8"/>
    <line x1="74.5" y1="24.1" x2="74.5" y2="30.1"/>
  </g>
  <ellipse cx="58.0" cy="22" rx="17.5" ry="6.1" fill="url(#pDial)" stroke="#827D6C" stroke-width="1.4"/>
  <!-- small-radius fillet shoulder (most of the lower top stays flat) -->
  <ellipse cx="58.0" cy="21.3" rx="10" ry="3.5" fill="#A6A08E"/>
  <!-- dial: narrow upper knurled cap -->
  <path d="M 50.5,13 A 7.5 2.6 0 0 0 65.5,13 L 65.5,22 A 7.5 2.6 0 0 1 50.5,22 Z" fill="url(#pDialWall)"/>
  <g stroke="#7E7967" stroke-width="1.1" opacity="0.85">
    <line x1="51.0" y1="13.9" x2="51.0" y2="22.9"/>
    <line x1="53.3" y1="15.0" x2="53.3" y2="24.0"/>
    <line x1="55.6" y1="15.5" x2="55.6" y2="24.5"/>
    <line x1="58.0" y1="15.6" x2="58.0" y2="24.6"/>
    <line x1="60.4" y1="15.5" x2="60.4" y2="24.5"/>
    <line x1="62.7" y1="15.0" x2="62.7" y2="24.0"/>
    <line x1="65.0" y1="13.9" x2="65.0" y2="22.9"/>
  </g>
  <ellipse cx="58.0" cy="13" rx="7.5" ry="2.6" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.4"/>
  <ellipse cx="58.0" cy="13" rx="4.4" ry="1.53" fill="none" stroke="#827D6C" stroke-width="0.9" opacity="0.8"/>
  <ellipse cx="58.0" cy="13" rx="1.5" ry="0.52" fill="none" stroke="#827D6C" stroke-width="1.1" opacity="1.0"/>
  <!-- fire button: TALL thin vertical rounded tab protruding
       slightly from the disc right side (~3:00), spanning the
       disc wall height; lit south face + darker outer edge. -->
  <path d="M 82.0,28.8 Q 84.1,29.4 84.0,32.0 L 83.7,37.4 Q 83.6,39.6 81.5,39.6 L 80.6,39.2 L 81.5,29.0 Z" fill="#C6461C"/>
  <path d="M 77.3,28.2 Q 79.1,26.8 81.2,27.6 Q 83.5,28.4 83.4,31.1 L 83.1,37.2 Q 83.0,39.5 80.8,39.4 Q 77.9,39.2 77.7,36.7 L 77.3,30.2 Q 77.1,28.7 77.3,28.2 Z" fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.1" stroke-linejoin="round"/>
  <path d="M 78.4,28.8 Q 80.0,27.7 81.8,28.4 L 81.1,29.8 Q 79.6,29.1 78.2,30.1 Z" fill="#FF9A5E"/>
</svg>
