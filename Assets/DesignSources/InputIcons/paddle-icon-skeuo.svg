<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) 3/4 glyph, rev 5 - Skeuomorphic theme.
    SHARED lower-right camera with the joystick and mouse: the head is a
    puck squashed to the common low elevation (ry = 14/24 rx), the handle
    leans down-LEFT (skew 0.25 about its top, y=40) because south points
    toward the viewer, and all top surfaces use the same linear top-light
    as jTop/mTop - no straight-on radial dome shading. The curved fire
    button stays a protruding chunk of the head's own ellipse at
    2 o'clock.
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4DFD0"/><stop offset="1" stop-color="#C6C0AF"/>
    </linearGradient>
    <linearGradient id="pSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B6B09F"/><stop offset="1" stop-color="#98927F"/>
    </linearGradient>
    <linearGradient id="pDial" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#C1BBA9"/><stop offset="1" stop-color="#9A9483"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#D2CCBC"/><stop offset="1" stop-color="#ACA694"/>
    </linearGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- handle: leans down-left under the shared camera (skew about y=40) -->
  <g transform="matrix(1,0,-0.25,1,10,0)">
    <polygon points="61,40 65,43 60.5,82.5 57,79" fill="#A9A392" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="44,79 57,79 60.5,82.5 47.5,82.5" fill="#B3AD9C" stroke="#8F8A7A" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M 37,40 L 59,40 Q 61,40 61,43 L 57.5,76 Q 57,79 52,79 L 44,79 Q 39,79 38.5,76 L 35,43 Q 35,40 37,40 Z"
          fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
    <line x1="38"   y1="54" x2="58"   y2="54" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="38.8" y1="60" x2="57.2" y2="60" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="39.6" y1="66" x2="56.4" y2="66" stroke="#A9A392" stroke-width="1.6"/>
    <line x1="40.4" y1="72" x2="55.6" y2="72" stroke="#A9A392" stroke-width="1.6"/>
  </g>

  <!-- fire button: curved chunk of the head ellipse at 2 o'clock -->
  <path d="M 48,32 L 66.0,19.5 A 28 16.3 0 0 1 75.6,29.2 Z"
        fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- head: puck at the shared low elevation (side band = wall height) -->
  <ellipse cx="48" cy="38" rx="24" ry="14" fill="url(#pSide)" stroke="#8F8A7A" stroke-width="1.6"/>
  <ellipse cx="48" cy="32" rx="24" ry="14" fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2"/>

  <!-- knurled dial (elliptical, matching the top-down tick ring) -->
  <ellipse cx="48" cy="34.5" rx="19" ry="11" fill="url(#pSide)" stroke="#827D6C" stroke-width="1.4"/>
  <ellipse cx="48" cy="31" rx="19" ry="11" fill="url(#pDial)" stroke="#827D6C" stroke-width="1.5"/>
  <g stroke="#7E7967" stroke-width="1.6" opacity="0.85">
    <line x1="48" y1="20.5" x2="48" y2="23.4"/>
    <line x1="57.3" y1="21.9" x2="54.8" y2="24.4"/>
    <line x1="64.1" y1="25.8" x2="59.8" y2="27.2"/>
    <line x1="66.6" y1="31" x2="61.6" y2="31"/>
    <line x1="64.1" y1="36.3" x2="59.8" y2="34.8"/>
    <line x1="57.3" y1="40.1" x2="54.8" y2="37.6"/>
    <line x1="48" y1="41.5" x2="48" y2="38.6"/>
    <line x1="38.7" y1="40.1" x2="41.2" y2="37.6"/>
    <line x1="31.9" y1="36.3" x2="36.2" y2="34.8"/>
    <line x1="29.4" y1="31" x2="34.4" y2="31"/>
    <line x1="31.9" y1="25.8" x2="36.2" y2="27.2"/>
    <line x1="38.7" y1="21.9" x2="41.2" y2="24.4"/>
  </g>

  <!-- raised center cap -->
  <ellipse cx="48" cy="32.6" rx="10" ry="5.8" fill="url(#pSide)" stroke="#827D6C" stroke-width="1.3"/>
  <ellipse cx="48" cy="29.5" rx="10" ry="5.8" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.5"/>
</svg>
