<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Hand Controller (A2M2001) top-down glyph, single paddle —
    DarkModern / retro themes. Round head with the big knurled dial +
    raised center cap, orange fire button on the head's left edge,
    ribbed teardrop handle tapering downward. 96x96 grid = D2D spec.
  -->
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E2DDCE"/><stop offset="1" stop-color="#C9C3B2"/>
    </linearGradient>
    <radialGradient id="pDial" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#BDB7A5"/><stop offset="1" stop-color="#9A9483"/>
    </radialGradient>
    <radialGradient id="pCap" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#D0CABA"/><stop offset="1" stop-color="#AEA896"/>
    </radialGradient>
    <linearGradient id="pBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7038"/><stop offset="1" stop-color="#E04E1E"/>
    </linearGradient>
  </defs>

  <!-- fire button: a curved chunk of the head's own circle protruding at
       2 o'clock (arc segment, radius ~ the head's), not a square -->
  <path d="M 48,34 L 66.3,12.2 A 28.5 28.5 0 0 1 76.1,29.1 Z"
        fill="url(#pBtn)" stroke="#A63C14" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- handle: tapered teardrop tail -->
  <path d="M 36,52 L 60,52 Q 62,52 62,55 L 58,84 Q 57.5,89 52,89 L 44,89 Q 38.5,89 38,84 L 34,55 Q 34,52 36,52 Z"
        fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- grip ribs -->
  <line x1="37.5" y1="60" x2="58.5" y2="60" stroke="#A9A392" stroke-width="1.6"/>
  <line x1="38.3" y1="66" x2="57.7" y2="66" stroke="#A9A392" stroke-width="1.6"/>
  <line x1="39.1" y1="72" x2="56.9" y2="72" stroke="#A9A392" stroke-width="1.6"/>
  <line x1="39.9" y1="78" x2="56.1" y2="78" stroke="#A9A392" stroke-width="1.6"/>

  <!-- head housing -->
  <circle cx="48" cy="34" r="24" fill="url(#pBody)" stroke="#8F8A7A" stroke-width="2"/>
  <!-- knurled dial: tick ring -->
  <circle cx="48" cy="34" r="19" fill="url(#pDial)" stroke="#827D6C" stroke-width="1.5"/>
  <g stroke="#7E7967" stroke-width="1.6" opacity="0.85">
    <line x1="48" y1="15.5" x2="48" y2="20.5"/>
    <line x1="57.2" y1="18" x2="54.7" y2="22.3"/>
    <line x1="64" y1="24.8" x2="59.7" y2="27.3"/>
    <line x1="66.5" y1="34" x2="61.5" y2="34"/>
    <line x1="64" y1="43.2" x2="59.7" y2="40.7"/>
    <line x1="57.2" y1="50" x2="54.7" y2="45.7"/>
    <line x1="48" y1="52.5" x2="48" y2="47.5"/>
    <line x1="38.8" y1="50" x2="41.3" y2="45.7"/>
    <line x1="32" y1="43.2" x2="36.3" y2="40.7"/>
    <line x1="29.5" y1="34" x2="34.5" y2="34"/>
    <line x1="32" y1="24.8" x2="36.3" y2="27.3"/>
    <line x1="38.8" y1="18" x2="41.3" y2="22.3"/>
  </g>
  <!-- raised center cap -->
  <circle cx="48" cy="34" r="10" fill="url(#pCap)" stroke="#827D6C" stroke-width="1.5"/>
  <circle cx="45" cy="31" r="3.5" fill="#FFFFFF" opacity="0.3"/>
</svg>
