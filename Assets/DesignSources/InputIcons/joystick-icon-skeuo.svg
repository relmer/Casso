<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Joystick IIe (A2M2002) 3/4 glyph, rev 3 - Skeuomorphic theme.
    SHARED CAMERA (all skeuo device glyphs): viewer at the lower-right
    corner, elevated. Oblique map from the top-down master grid:
        X = 10 + (x-6)*0.762 + (90-y)*0.143 ;  Y = 58 - (90-y)*0.190
    Buttons are ON THE TOP FACE at the top-down NW positions (one north of
    the well, one west of it), drawn as raised cubes - not on the front.
  -->
  <defs>
    <linearGradient id="jTop" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#E8E3D4"/><stop offset="1" stop-color="#D5CFBE"/>
    </linearGradient>
    <linearGradient id="jFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFC9B8"/><stop offset="1" stop-color="#BFB9A7"/>
    </linearGradient>
    <linearGradient id="jStick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#55514B"/><stop offset="0.4" stop-color="#3A3733"/><stop offset="1" stop-color="#262421"/>
    </linearGradient>
  </defs>
  <path d="M 74,58 L 83,46 Q 86,42 86,47 L 86,69 Q 86,74 83,78 L 74,90 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <rect x="10" y="58" width="64" height="32" rx="6" fill="url(#jFront)" stroke="#8F8A7A" stroke-width="2"/>
  <line x1="13" y1="76" x2="71" y2="76" stroke="#8F8A7A" stroke-width="1.2" opacity="0.8"/>
  <path d="M 10,77 h 64 v 7 q 0,6 -6,6 H 16 q -6,0 -6,-6 Z" fill="#000000" opacity="0.06"/>
  <path d="M 13,54 L 19,46 Q 22,42 27,42 L 81,42 Q 86,42 83,46 L 77,54 Q 74,58 69,58 L 15,58 Q 10,58 13,54 Z"
        fill="url(#jTop)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- well: top-down (36,36)-(86,86) mapped -->
  <polygon points="33.4,57.2 71.7,57.2 78.8,47.7 40.6,47.7" fill="#6B6759"
           stroke="#6B6759" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="40.6,47.7 78.8,47.7 64,51 49,51" fill="#8D8877"/>
  <!-- button A: north of well, td (36,11)-(52,27), raised cube -->
  <polygon points="42.9,40 54.1,40 54.1,46 42.9,46"     fill="#E04E1E" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="54.1,40 56.3,37 56.3,43 54.1,46"     fill="#C24418" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="44.1,37 56.3,37 54.1,40 42.9,40"     fill="#FF7038" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- button B: west of well, td (11,36)-(27,52), raised cube -->
  <polygon points="19.2,44.8 31.4,44.8 31.4,50.8 19.2,50.8" fill="#E04E1E" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="31.4,44.8 33.7,41.7 33.7,47.7 31.4,50.8" fill="#C24418" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="21.5,41.7 33.7,41.7 31.4,44.8 19.2,44.8" fill="#FF7038" stroke="#A63C14" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- stick over well center (61,61)td -> (56,52.5) -->
  <rect x="54.4" y="42.5" width="3.2" height="10" rx="1.5" fill="#7A6A4E"/>
  <polygon points="52.5,44.5 59.5,44.5 62,14 50,14" fill="url(#jStick)"
           stroke="#3A3733" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="56" cy="14" r="6.5" fill="url(#jStick)"/>
  <ellipse cx="54" cy="12" rx="2.2" ry="3" fill="#FFFFFF" opacity="0.22"/>
</svg>
