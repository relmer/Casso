<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Mouse (M0100) 3/4 glyph, rev 4 - Skeuomorphic theme.
    Same shared camera as the joystick. Body proportions follow the
    top-down master (footprint 56x84, button 64% width at the north end);
    the button sits on the top face at the BACK (north) with its depth
    slightly exaggerated so it reads through the foreshortening.
  -->
  <defs>
    <linearGradient id="mTop" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#EAE5D6"/><stop offset="1" stop-color="#D6D0BF"/>
    </linearGradient>
    <linearGradient id="mFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFC9B8"/><stop offset="1" stop-color="#BFB9A7"/>
    </linearGradient>
    <linearGradient id="mBtn" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#C2BFB8"/><stop offset="1" stop-color="#9F9C93"/>
    </linearGradient>
  </defs>
  <!-- right side face -->
  <path d="M 59,64 L 69,50 Q 71,47 71,51 L 71,63 Q 71,67 69,70 L 59,84 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- front face -->
  <rect x="16" y="64" width="43" height="20" rx="5" fill="url(#mFront)" stroke="#8F8A7A" stroke-width="2"/>
  <line x1="18.5" y1="78" x2="56.5" y2="78" stroke="#8F8A7A" stroke-width="1.1" opacity="0.7"/>
  <!-- top face -->
  <path d="M 19,61 L 26,51 Q 28,48 32.5,48 L 67,48 Q 71.5,48 69,51.5 L 62,61 Q 59.5,64 55,64 L 20.5,64 Q 16,64 19,61 Z"
        fill="url(#mTop)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- chamfer hint along the south edge of the top face -->
  <line x1="22" y1="60.5" x2="56" y2="60.5" stroke="#B4AE9C" stroke-width="1.2" opacity="0.9"/>
  <!-- the single wide button at the NORTH (back) of the top face -->
  <polygon points="33.6,48.5 64.2,48.5 58.8,56.2 28.4,56.2" fill="#6E6B62"
           stroke="#6E6B62" stroke-width="2.4" stroke-linejoin="round"/>
  <polygon points="34.9,49.6 62.4,49.6 57.7,55.1 30.2,55.1" fill="url(#mBtn)"/>
</svg>
