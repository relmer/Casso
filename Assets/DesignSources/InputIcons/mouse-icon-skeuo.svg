<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Apple Mouse (M0100 family) 3/4 glyph, rev 2 — Skeuomorphic theme.
    Per user reference (Image #13): a shallow rounded box (NOT a steep
    wedge) in the house oblique projection (+0.6,-0.8 depth), a chamfer
    frame inset around the top face, and the single gray button recessed
    near the FRONT-LEFT of the top. Rounded edges. 96x96 grid = D2D spec.
  -->
  <defs>
    <linearGradient id="mkTop" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#EAE5D6"/><stop offset="1" stop-color="#D6D0BF"/>
    </linearGradient>
    <linearGradient id="mkFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFC9B8"/><stop offset="1" stop-color="#BFB9A7"/>
    </linearGradient>
    <linearGradient id="mkBtn" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#C2BFB8"/><stop offset="1" stop-color="#9F9C93"/>
    </linearGradient>
  </defs>

  <!-- right side face (shallow, rounded outer corners) -->
  <path d="M 68,58 L 84,37 Q 87,33 87,38 L 87,56 Q 87,61 84,65 L 68,86 Z"
        fill="#A9A392" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- front face (low) -->
  <rect x="8" y="58" width="60" height="28" rx="6" fill="url(#mkFront)" stroke="#8F8A7A" stroke-width="2"/>
  <!-- base seam -->
  <line x1="11" y1="79" x2="65" y2="79" stroke="#8F8A7A" stroke-width="1.2" opacity="0.7"/>
  <!-- top face (oblique parallelogram, bezier-rounded corners) -->
  <path d="M 11.5,54 L 22,39.5 Q 24.5,36 29.5,36 L 81,36 Q 86,36 83.5,39.5 L 73,54 Q 70.5,58 65.5,58 L 13,58 Q 8,58 11.5,54 Z"
        fill="url(#mkTop)" stroke="#8F8A7A" stroke-width="2" stroke-linejoin="round"/>
  <!-- chamfer frame inset on the top face -->
  <path d="M 16.5,53 L 25.5,40.5 Q 27,38.5 30,38.5 L 78,38.5 Q 81,38.5 79.5,40.5 L 70.5,53 Q 69,55.5 66,55.5 L 15,55.5 Q 15,55.5 16.5,53 Z"
        fill="none" stroke="#B4AE9C" stroke-width="1.4" opacity="0.9"/>

  <!-- recessed single button at the BACK (north) edge of the top face
       (rev 3: the mouse points north; button on the N side per feedback) -->
  <path d="M 36.5,51 L 44.5,40.5 Q 45.5,39.5 48,39.5 L 64,39.5 Q 67,39.5 66,41 L 58.5,51 Q 57,53 54,53 L 39,53 Q 35.5,53 36.5,51 Z"
        fill="url(#mkBtn)" stroke="#6E6B62" stroke-width="1.8" stroke-linejoin="round"/>
</svg>
